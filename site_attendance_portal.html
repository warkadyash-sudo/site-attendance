<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Civil & Marine — Site Attendance</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="C&M Attendance" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark:    #1F3864;
    --mid:     #2E4F8A;
    --light:   #D6E0F5;
    --white:   #FFFFFF;
    --bg:      #EDF1FA;
    --border:  #B8C8E8;
    --text:    #1F3864;
    --subtext: #4A6094;
    --green:   #1B6B3A;
    --green-bg:#D4EDE1;
    --amber:   #7D5200;
    --amber-bg:#FFF0CC;
    --red:     #8B1A1A;
    --red-bg:  #FAD7D7;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: block; }
  .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
  .login-box { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(31,56,100,0.10); }
  .login-logo { display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; background: var(--white); border-radius: 10px; padding: 10px; }
  .login-logo img { height: 72px; width: auto; }
  .login-title { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 4px; text-align: center; }
  .login-sub { font-size: 12px; color: var(--subtext); text-align: center; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .topbar { background: var(--dark); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { height: 34px; width: auto; filter: brightness(0) invert(1); }
  .topbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.25); }
  .topbar-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: rgba(255,255,255,0.6); }
  .topbar-name { font-size: 14px; font-weight: 600; color: var(--white); }
  .main { padding: 1.5rem; max-width: 700px; margin: 0 auto; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--subtext); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  input[type=text], input[type=password], select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; background: var(--white); color: var(--text); transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--mid); box-shadow: 0 0 0 3px rgba(31,56,100,0.1); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text); transition: all 0.15s; font-family: inherit; }
  .btn:hover { background: var(--light); }
  .btn-primary { background: var(--dark); color: var(--white); border-color: var(--dark); }
  .btn-primary:hover { background: var(--mid); border-color: var(--mid); }
  .btn-full { width: 100%; }
  .btn-green { background: var(--green); color: var(--white); border-color: var(--green); }
  .btn-green:hover { opacity: 0.88; }
  .btn-red { background: #B91C1C; color: var(--white); border-color: #B91C1C; }
  .btn-red:hover { opacity: 0.88; }
  .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
  .btn-outline-green { color: var(--green); border-color: var(--green); background: transparent; }
  .btn-outline-green:hover { background: var(--green-bg); }
  .btn-topbar { background: rgba(255,255,255,0.15); color: var(--white); border-color: rgba(255,255,255,0.25); }
  .btn-topbar:hover { background: rgba(255,255,255,0.25); }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 15px; font-weight: 600; color: var(--dark); margin-bottom: 1rem; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-gray { background: var(--light); color: var(--subtext); }
  .badge-blue { background: var(--light); color: var(--dark); }
  .status-banner { border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: none; }
  .status-banner.in { background: var(--green-bg); border: 1px solid #A7D5BC; }
  .status-banner.in .sb-title { color: var(--green); font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .status-banner.in .sb-sub { color: #1B5C34; font-size: 13px; }
  .loc-strip { display: flex; align-items: flex-start; gap: 10px; background: var(--light); border-radius: 8px; padding: 10px 12px; margin-bottom: 1rem; font-size: 13px; color: var(--subtext); border: 1px solid var(--border); }
  .loc-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .loc-dot.ok { background: var(--green); }
  .loc-dot.warn { background: #D97706; }
  .loc-dot.err { background: #DC2626; }
  .loc-dot.loading { background: var(--subtext); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .record-row { border-bottom: 1px solid var(--light); padding: 12px 0; }
  .record-row:last-child { border-bottom: none; }
  .record-name { font-size: 14px; font-weight: 600; color: var(--dark); }
  .record-meta { font-size: 12px; color: var(--subtext); margin-top: 3px; line-height: 1.6; }
  .record-note { font-size: 12px; color: var(--text); margin-top: 4px; font-style: italic; }
  .flag-note { font-size: 12px; color: #B45309; margin-top: 4px; font-weight: 500; }
  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; background: var(--light); padding: 4px; border-radius: 10px; }
  .tab { flex: 1; padding: 7px 10px; border: none; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--subtext); font-family: inherit; transition: all 0.15s; text-align: center; }
  .tab.active { background: var(--dark); color: var(--white); }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
  .metric-val { font-size: 26px; font-weight: 700; color: var(--dark); }
  .metric-lbl { font-size: 11px; color: var(--subtext); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
  .week-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--subtext); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--dark); color: var(--white); padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .loading-overlay { position: fixed; inset: 0; background: rgba(237,241,250,0.85); display: none; align-items: center; justify-content: center; z-index: 100; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--dark); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { font-size: 13px; color: var(--subtext); text-align: center; padding: 2rem 0; }
  .live-time { font-size: 13px; color: rgba(255,255,255,0.7); font-variant-numeric: tabular-nums; }
  .admin-note-input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; font-family: inherit; background: var(--bg); color: var(--text); margin-top: 6px; }
  @media (max-width: 480px) { .metrics { gap: 6px; } .metric-val { font-size: 20px; } .main { padding: 1rem; } .tab { font-size: 12px; padding: 7px 6px; } .topbar { padding: 0 1rem; } }
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay" style="display:none;"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <img src="https://warkadyash-sudo.github.io/site-attendance/logo.png" alt="Civil & Marine Group" onerror="this.style.display='none'" />
      </div>
      <div class="login-title">Site Attendance Portal</div>
      <div class="login-sub">Civil &amp; Marine Group</div>
      <div class="field"><label>Full Name</label><input type="text" id="login-name" placeholder="e.g. John Smith" autocomplete="off" /></div>
      <div class="field">
        <label>Role</label>
        <select id="login-role">
          <option value="">Select role...</option>
          <option>Site Manager</option>
          <option>Supervisor</option>
          <option>Engineer</option>
          <option>Operator</option>
          <option>Labourer</option>
          <option>Subcontractor</option>
        </select>
      </div>
      <div class="field" id="company-field" style="display:none;">
        <label>Company Name</label>
        <input type="text" id="subcontractor-company" placeholder="e.g. ABC Earthworks Pty Ltd" />
      </div>
      <div class="field">
        <label>Access Level</label>
        <select id="login-access">
          <option value="worker">Worker</option>
          <option value="admin">Admin / Manager</option>
        </select>
      </div>
      <div id="admin-pin-field" class="field" style="display:none;">
        <label>Admin PIN</label>
        <input type="password" id="admin-pin" placeholder="Enter PIN" maxlength="6" />
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()" style="margin-top:0.5rem;">Continue &rarr;</button>
      <p style="font-size:11px;color:var(--subtext);text-align:center;margin-top:12px;">GPS location captured on clock-in</p>
    </div>
  </div>
</div>

<!-- WORKER -->
<div id="screen-worker" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <img class="topbar-logo" src="https://warkadyash-sudo.github.io/site-attendance/logo.png" alt="Civil & Marine" onerror="this.style.display='none'" />
      <div class="topbar-divider"></div>
      <div><div class="topbar-label">Site Attendance</div><div class="topbar-name" id="worker-name-display"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="live-time" id="live-clock"></span>
      <button class="btn btn-sm btn-topbar" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <div class="main">
    <div class="status-banner in" id="clocked-in-banner">
      <div class="sb-title">&#9679; Currently clocked in</div>
      <div class="sb-sub" id="banner-detail"></div>
    </div>
    <div class="loc-strip"><div class="loc-dot loading" id="loc-dot"></div><span id="loc-text">Getting your location...</span></div>
    <div class="card" id="clock-in-card">
      <div class="card-title">Clock in</div>
      <div class="field">
        <label>Site / Project</label>
        <select id="site-select">
          <option value="">Select site...</option>
          <option>35 Federation Drive, Bethania</option>
          <option>171 Lutwyche Road, Windsor</option>
          <option>11 Dartbrook Court, Flinders View</option>
          <option>75 Spine Street, Sumner</option>
          <option>Other (see comments)</option>
        </select>
      </div>
      <div class="field"><label>Work planned today</label><textarea id="clock-in-comments" placeholder="e.g. pipe installation, formwork, excavation, survey..."></textarea></div>
      <button class="btn btn-green btn-full" onclick="clockIn()">Clock in now</button>
    </div>
    <div class="card" id="clock-out-card" style="display:none;">
      <div class="card-title">Clock out</div>
      <div class="field"><label>End of day notes</label><textarea id="clock-out-comments" placeholder="Progress, issues, quantities completed, anything to note..."></textarea></div>
      <button class="btn btn-red btn-full" onclick="clockOut()">Clock out</button>
    </div>
    <div class="card">
      <div class="card-title">My recent records</div>
      <div id="my-records"><div class="empty">No records yet</div></div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <img class="topbar-logo" src="https://warkadyash-sudo.github.io/site-attendance/logo.png" alt="Civil & Marine" onerror="this.style.display='none'" />
      <div class="topbar-divider"></div>
      <div><div class="topbar-label">Admin — Attendance Records</div><div class="topbar-name" id="admin-name-display"></div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn btn-sm btn-topbar" onclick="refreshAdmin()">&#8635; Refresh</button>
      <button class="btn btn-sm btn-topbar" onclick="doLogout()">Sign out</button>
    </div>
  </div>
  <div class="main">
    <div class="metrics" id="admin-metrics"></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,'pending')">Pending</button>
      <button class="tab" onclick="switchTab(this,'live')">On site now</button>
      <button class="tab" onclick="switchTab(this,'all')">All records</button>
    </div>
    <div id="admin-content"></div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx-jbLuOJnZDpeh-k4MQ6PkqLlgOfmqky90Mkrji4mNZy_XnQ4ozyWjhxFYQ6QWpzzF4w/exec';
const ADMIN_PIN = '0107';

const SITES = {
  '35 Federation Drive, Bethania':     { lat: -27.6869, lng: 153.1575 },
  '171 Lutwyche Road, Windsor':        { lat: -27.4383, lng: 153.0323 },
  '11 Dartbrook Court, Flinders View': { lat: -27.6516, lng: 152.7794 },
  '75 Spine Street, Sumner':           { lat: -27.5636, lng: 152.9344 }
};
const GEOFENCE_M = 500;

let state = { user:null, role:null, company:null, access:null, location:null, locationOk:null, locationAddress:null, currentRecordId:null, adminTab:'pending', allRecords:[] };

function toProperCase(str) {
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()).trim();
}
function loading(on) { document.getElementById('loading-overlay').style.display = on ? 'flex' : 'none'; }
function toast(msg, dur=2500) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),dur); }
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

function nowFmt() {
  const d = new Date();
  const date = d.toLocaleDateString('en-AU', {timeZone:'Australia/Brisbane', day:'2-digit', month:'short', year:'numeric'});
  const time = d.toLocaleTimeString('en-AU', {timeZone:'Australia/Brisbane', hour:'2-digit', minute:'2-digit', hour12:true});
  return { date, time };
}

function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000,r=x=>x*Math.PI/180,dLat=r(lat2-lat1),dLng=r(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function checkGeofence(siteName) {
  if (!state.location) return 'NO GPS';
  const site = SITES[siteName];
  if (!site) return 'OK';
  const dist = haversine(state.location.lat, state.location.lng, site.lat, site.lng);
  state.locationOk = dist <= GEOFENCE_M;
  const dot=document.getElementById('loc-dot'), txt=document.getElementById('loc-text');
  if (state.locationOk) {
    dot.className='loc-dot ok'; txt.textContent='Location confirmed — '+Math.round(dist)+'m from '+siteName;
  } else {
    dot.className='loc-dot warn'; txt.textContent=''+Math.round(dist)+'m from '+siteName+' — will be flagged';
  }
  return state.locationOk ? 'OK' : 'OFF-SITE';
}

function apiCall(params) {
  return new Promise((resolve, reject) => {
    const cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*10000);
    const url=API+'?'+Object.entries({...params,callback:cb}).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(String(v))).join('&');
    const script=document.createElement('script');
    const timeout=setTimeout(()=>{ delete window[cb]; if(script.parentNode)document.body.removeChild(script); reject(new Error('Timeout')); },15000);
    window[cb]=(data)=>{ clearTimeout(timeout); delete window[cb]; if(script.parentNode)document.body.removeChild(script); resolve(data); };
    script.src=url;
    script.onerror=()=>{ clearTimeout(timeout); delete window[cb]; reject(new Error('Script error')); };
    document.body.appendChild(script);
  });
}

document.getElementById('login-role').addEventListener('change', function() {
  document.getElementById('company-field').style.display = this.value==='Subcontractor' ? 'block' : 'none';
});
document.getElementById('login-access').addEventListener('change', function() {
  document.getElementById('admin-pin-field').style.display = this.value==='admin' ? 'block' : 'none';
});
document.getElementById('site-select').addEventListener('change', function() {
  if (this.value && state.location) checkGeofence(this.value);
});

async function doLogin() {
  const nameRaw = document.getElementById('login-name').value.trim();
  const role = document.getElementById('login-role').value;
  const access = document.getElementById('login-access').value;
  const company = document.getElementById('subcontractor-company').value.trim();
  if (!nameRaw){alert('Enter your name.');return;}
  if (!role){alert('Select your role.');return;}
  if (role==='Subcontractor'&&!company){alert('Enter your company name.');return;}
  if (access==='admin'&&document.getElementById('admin-pin').value!==ADMIN_PIN){alert('Incorrect PIN.');return;}
  const name = toProperCase(nameRaw);
  state.user=name; state.role=role; state.access=access; state.company=company||null;
  loading(true);
  try{await apiCall({action:'init'});}catch(e){}
  loading(false);
  if (access==='admin') {
    document.getElementById('admin-name-display').textContent=name;
    show('screen-admin'); refreshAdmin();
  } else {
    document.getElementById('worker-name-display').textContent=name+(company?' ('+company+')':'');
    show('screen-worker'); getLocation(); checkIfClockedIn();
  }
}

function doLogout() {
  state={user:null,role:null,company:null,access:null,location:null,locationOk:null,locationAddress:null,currentRecordId:null,adminTab:'pending',allRecords:[]};
  ['login-name','admin-pin','subcontractor-company'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('login-role').value='';
  document.getElementById('login-access').value='worker';
  document.getElementById('admin-pin-field').style.display='none';
  document.getElementById('company-field').style.display='none';
  show('screen-login');
}

function getLocation() {
  const dot=document.getElementById('loc-dot'),txt=document.getElementById('loc-text');
  if (!navigator.geolocation){dot.className='loc-dot err';txt.textContent='Geolocation not supported.';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    state.location={lat:pos.coords.latitude,lng:pos.coords.longitude};
    state.locationAddress=pos.coords.latitude.toFixed(5)+', '+pos.coords.longitude.toFixed(5);
    dot.className='loc-dot ok'; txt.textContent='GPS acquired — select a site to verify location';
    const sel=document.getElementById('site-select');
    if(sel.value) checkGeofence(sel.value);
  },()=>{dot.className='loc-dot err';txt.textContent='Location access denied — GPS will not be recorded.';});
}

async function checkIfClockedIn() {
  loading(true);
  try {
    const res=await apiCall({action:'getRecords', name:state.user});
    const mine=(res.records||[]).filter(r=>!r.clockOut);
    if(mine.length){state.currentRecordId=String(mine[mine.length-1].id);showClockedInState(mine[mine.length-1]);}
    renderMyRecords(res.records||[]);
  }catch(e){toast('Could not load records');}
  loading(false);
}

function showClockedInState(r) {
  document.getElementById('clock-in-card').style.display='none';
  document.getElementById('clock-out-card').style.display='block';
  document.getElementById('clocked-in-banner').style.display='block';
  document.getElementById('banner-detail').textContent=r.date+' at '+r.clockIn+' — '+r.site;
}

async function clockIn() {
  const site=document.getElementById('site-select').value;
  const comments=document.getElementById('clock-in-comments').value.trim();
  if(!site){alert('Select a site before clocking in.');return;}
  const locationFlag=checkGeofence(site);
  const id=Date.now();
  const ts=nowFmt();
  loading(true);
  try {
    await apiCall({
      action:'clockIn', id, name:state.user, role:state.role,
      company:state.company||'', site,
      date:ts.date, clockIn:ts.time,
      amNotes:comments, locationFlag,
      address:state.locationAddress||''
    });
    state.currentRecordId=String(id);
    showClockedInState({date:ts.date, clockIn:ts.time, site});
    document.getElementById('clock-in-comments').value='';
    document.getElementById('site-select').value='';
    toast('Clocked in — '+ts.time);
    const res=await apiCall({action:'getRecords', name:state.user});
    renderMyRecords(res.records||[]);
  }catch(e){toast('Error — check connection');}
  loading(false);
}

async function clockOut() {
  if(!state.currentRecordId)return;
  const notes=document.getElementById('clock-out-comments').value.trim();
  const ts=nowFmt();
  loading(true);
  try {
    await apiCall({action:'clockOut', id:state.currentRecordId, name:state.user, clockOut:ts.time, pmNotes:notes});
    state.currentRecordId=null;
    document.getElementById('clock-in-card').style.display='block';
    document.getElementById('clock-out-card').style.display='none';
    document.getElementById('clocked-in-banner').style.display='none';
    document.getElementById('clock-out-comments').value='';
    toast('Clocked out — '+ts.time);
    const res=await apiCall({action:'getRecords', name:state.user});
    renderMyRecords(res.records||[]);
  }catch(e){toast('Error — check connection');}
  loading(false);
}

function renderMyRecords(records) {
  const mine=records.slice(-7).reverse();
  const el=document.getElementById('my-records');
  if(!mine.length){el.innerHTML='<div class="empty">No records yet</div>';return;}
  el.innerHTML=mine.map(r=>`
    <div class="record-row">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
        <span style="font-size:13px;font-weight:600;color:var(--dark)">${r.date||'—'}</span>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${r.clockOut?'<span class="badge badge-gray">Completed</span>':'<span class="badge badge-green">In progress</span>'}
          ${r.approved==='Yes'?'<span class="badge badge-blue">Approved</span>':''}
          ${r.locationFlag==='OFF-SITE'?'<span class="badge badge-amber">GPS flagged</span>':''}
        </div>
      </div>
      <div class="record-meta">${r.site}</div>
      <div class="record-meta">In: ${r.clockIn||'—'} &nbsp;·&nbsp; Out: ${r.clockOut||'—'} ${r.duration?'&nbsp;·&nbsp; '+parseFloat(r.duration).toFixed(1)+'h':''}</div>
      ${r.amNotes?`<div class="record-note">AM: "${r.amNotes}"</div>`:''}
      ${r.pmNotes?`<div class="record-note">PM: "${r.pmNotes}"</div>`:''}
      ${r.locationFlag==='OFF-SITE'?'<div class="flag-note">&#9888; Clocked in outside site geofence</div>':''}
    </div>
  `).join('');
}

async function refreshAdmin() {
  loading(true);
  try{const res=await apiCall({action:'getAllRecords'});state.allRecords=res.records||[];renderAdmin();}
  catch(e){toast('Could not load records');}
  loading(false);
}

function switchTab(btn,tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active'); state.adminTab=tab; renderAdmin();
}

function weekKey(dateStr) {
  const parts = dateStr ? dateStr.split(' ') : [];
  if (parts.length < 3) return dateStr||'';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const mon = new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
  return mon.toISOString().slice(0,10);
}
function weekLabel(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const mon = new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
  const sat = new Date(mon); sat.setDate(mon.getDate()+5);
  return mon.toLocaleDateString('en-AU',{day:'2-digit',month:'short'})+' – '+sat.toLocaleDateString('en-AU',{day:'2-digit',month:'short'});
}

function renderAdmin() {
  const all=state.allRecords;
  const pending=all.filter(r=>r.clockOut&&r.approved!=='Yes');
  const live=all.filter(r=>!r.clockOut);
  const flagged=all.filter(r=>r.locationFlag==='OFF-SITE');
  document.getElementById('admin-metrics').innerHTML=`
    <div class="metric"><div class="metric-val">${live.length}</div><div class="metric-lbl">On site now</div></div>
    <div class="metric"><div class="metric-val">${pending.length}</div><div class="metric-lbl">Awaiting approval</div></div>
    <div class="metric"><div class="metric-val">${flagged.length}</div><div class="metric-lbl">GPS flagged</div></div>
  `;
  let records=state.adminTab==='pending'?pending:state.adminTab==='live'?live:all.slice().reverse();
  const el=document.getElementById('admin-content');
  if(!records.length){el.innerHTML='<div class="empty">Nothing here</div>';return;}
  if(state.adminTab==='pending'){
    const byWeek={};
    records.forEach(r=>{
      const k=weekKey(r.date);
      const lbl=weekLabel(r.date);
      if(!byWeek[k])byWeek[k]={label:lbl,recs:[]};
      byWeek[k].recs.push(r);
    });
    el.innerHTML=Object.entries(byWeek).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,{label,recs}])=>`
      <div style="margin-bottom:1.5rem;">
        <div class="week-label"><span>Week of ${label}</span><button class="btn btn-sm btn-outline-green" onclick="approveWeek('${k}')">Approve all this week</button></div>
        <div class="card" style="padding:0.75rem 1.25rem;">${recs.map(r=>recordHTML(r,true)).join('')}</div>
      </div>
    `).join('');
  } else {
    el.innerHTML=`<div class="card" style="padding:0.75rem 1.25rem;">${records.map(r=>recordHTML(r,false)).join('')}</div>`;
  }
}

function recordHTML(r,showApprove) {
  return `
    <div class="record-row">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
        <span class="record-name">${r.name} <span style="font-weight:400;color:var(--subtext);font-size:12px;">${r.role}${r.company?' · '+r.company:''}</span></span>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">
          ${r.approved==='Yes'?'<span class="badge badge-blue">Approved</span>':r.clockOut?'<span class="badge badge-amber">Pending</span>':'<span class="badge badge-green">On site</span>'}
          ${r.locationFlag==='OFF-SITE'?'<span class="badge badge-red">GPS off-site</span>':''}
          ${r.locationFlag==='NO GPS'?'<span class="badge badge-gray">No GPS</span>':''}
        </div>
      </div>
      <div class="record-meta">${r.site}</div>
      <div class="record-meta">Date: ${r.date||'—'} &nbsp;·&nbsp; In: ${r.clockIn||'—'} &nbsp;·&nbsp; Out: ${r.clockOut||'<span style="color:#D97706">On site</span>'} ${r.duration?'&nbsp;·&nbsp; '+parseFloat(r.duration).toFixed(1)+'h':''}</div>
      ${r.amNotes?`<div class="record-note">AM: "${r.amNotes}"</div>`:''}
      ${r.pmNotes?`<div class="record-note">PM: "${r.pmNotes}"</div>`:''}
      ${r.locationFlag==='OFF-SITE'?'<div class="flag-note">&#9888; Clocked in outside site geofence</div>':''}
      ${r.adminNote?`<div class="record-note" style="color:var(--dark);font-style:normal;margin-top:6px;"><strong>Admin note:</strong> ${r.adminNote}</div>`:''}
      ${showApprove&&r.clockOut&&r.approved!=='Yes'?`
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <input class="admin-note-input" id="note_${r.id}" placeholder="Add note before approving (optional)" style="flex:1;min-width:180px;" />
          <button class="btn btn-sm btn-outline-green" onclick="approveOne('${r.id}','${r.name}')">Approve</button>
        </div>
      `:''}
      ${r.approved==='Yes'&&r.approvedBy?`<div class="record-meta" style="margin-top:4px;">Approved by ${r.approvedBy} · ${r.approvedDate}</div>`:''}
    </div>
  `;
}

async function approveOne(id, name) {
  const noteEl=document.getElementById('note_'+id);
  const note=noteEl?noteEl.value.trim():'';
  const ts=nowFmt();
  loading(true);
  try{
    await apiCall({action:'approve', id, name, approvedBy:state.user, approvedDate:ts.date+' '+ts.time, adminNote:note});
    toast('Record approved'); await refreshAdmin();
  }catch(e){toast('Error approving');loading(false);}
}

async function approveWeek(wk) {
  const toApprove=state.allRecords.filter(r=>r.clockOut&&r.approved!=='Yes'&&weekKey(r.date)===wk);
  const ts=nowFmt();
  loading(true);
  try{
    for(const r of toApprove) await apiCall({action:'approve', id:r.id, name:r.name, approvedBy:state.user, approvedDate:ts.date+' '+ts.time, adminNote:''});
    toast(toApprove.length+' record'+(toApprove.length!==1?'s':'')+' approved');
    await refreshAdmin();
  }catch(e){toast('Error approving');loading(false);}
}

setInterval(()=>{
  const el=document.getElementById('live-clock');
  if(el)el.textContent=new Date().toLocaleTimeString('en-AU',{timeZone:'Australia/Brisbane',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
},1000);
</script>
</body>
</html>
